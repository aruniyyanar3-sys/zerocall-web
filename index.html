<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeroCall AI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
            text-align: center; 
            width: 90%; 
            max-width: 400px; 
        }
        h1 { 
            color: #333; 
            margin-bottom: 10px; 
            font-size: 28px;
        }
        p.subtitle { 
            color: #666; 
            margin-bottom: 30px; 
            font-size: 14px;
        }
        .mic-btn { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 20px 50px; 
            border-radius: 50px; 
            font-size: 18px; 
            cursor: pointer; 
            transition: all 0.3s; 
            outline: none;
            box-shadow: 0 4px 15px rgba(0,123,255,0.4);
        }
        .mic-btn:hover { 
            background: #0056b3; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,123,255,0.6);
        }
        .mic-btn.listening { 
            background: #dc3545; 
            animation: pulse 1.5s infinite; 
            box-shadow: 0 4px 15px rgba(220,53,69,0.4);
        }
        #status { 
            margin-top: 25px; 
            color: #666; 
            font-weight: 600; 
            min-height: 24px;
            font-size: 14px;
        }
        @keyframes pulse { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.05); } 
            100% { transform: scale(1); } 
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎙️ ZeroCall AI</h1>
        <p class="subtitle">Tap to speak. Ask anything.</p>
        <button class="mic-btn" id="talkBtn">Tap to Speak</button>
        <p id="status">Ready</p>
        <p class="footer">Powered by Google Gemini AI</p>
    </div>

    <script>
        const talkBtn = document.getElementById('talkBtn');
        const status = document.getElementById('status');
        
        // ⚠️ REPLACE WITH YOUR RENDER BACKEND URL
        const BACKEND_URL = 'https://YOUR-RENDER-URL.onrender.com/chat';

        // Check browser support
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Your browser does not support Voice Recognition. Please use Google Chrome.");
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        talkBtn.onclick = () => {
            if (talkBtn.classList.contains('listening')) {
                recognition.stop();
            } else {
                recognition.start();
            }
        };

        recognition.onstart = () => {
            talkBtn.classList.add('listening');
            status.innerText = "Listening...";
            status.style.color = "#dc3545";
        };

        recognition.onend = () => {
            talkBtn.classList.remove('listening');
            status.innerText = "Thinking...";
            status.style.color = "#666";
        };

        recognition.onerror = (event) => {
            talkBtn.classList.remove('listening');
            status.innerText = "Error: " + event.error;
            status.style.color = "#dc3545";
        };

        recognition.onresult = async (event) => {
            const text = event.results[0][0].transcript;
            status.innerText = `You: "${text}"`;
            status.style.color = "#007bff";
            
            try {
                const res = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: text,
                        tenant_id: "default"
                    })
                });
                
                if (!res.ok) throw new Error('Backend error');
                
                const data = await res.json();
                speak(data.reply);
            } catch (e) {
                status.innerText = "Error: Check connection";
                status.style.color = "#dc3545";
                console.error(e);
            }
        };

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            utterance.onend = () => { 
                status.innerText = "Ready"; 
                status.style.color = "#666";
            };
            utterance.onerror = () => {
                status.innerText = "Audio error";
                status.style.color = "#dc3545";
            };
            window.speechSynthesis.speak(utterance);
        }

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log('Service Worker Registered'))
                .catch(err => console.error('SW Error:', err));
        }
    </script>
</body>
</html>
